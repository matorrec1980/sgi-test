<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>SGI Role Debug</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<h2>SGI Role Debug</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<br><br>

<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>
<button onclick="checkSession()">Check Session</button>
<button onclick="checkRole()">Check Role (DB)</button>
<button onclick="testUpdate()">Test Update</button>

<pre id="result"></pre>

<script>

const SUPABASE_URL = "https://rnoprngmmqvrzfygyppg.supabase.co";
const SUPABASE_KEY = "sb_publishable_zLWA_SDD0Y6Jt3ADtdmwZg_M95oKx8W";

const { createClient } = supabase;
const client = createClient(SUPABASE_URL, SUPABASE_KEY);

async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await client.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    document.getElementById("result").innerText =
      "LOGIN ERROR:\n" + error.message;
    return;
  }

  document.getElementById("result").innerText =
    "LOGIN SUCCESS:\n" +
    data.user.email;
}

async function logout() {
  await client.auth.signOut();
  document.getElementById("result").innerText = "LOGGED OUT";
}

async function checkSession() {
  const { data } = await client.auth.getSession();

  if (!data.session) {
    document.getElementById("result").innerText =
      "NO ACTIVE SESSION";
    return;
  }

  document.getElementById("result").innerText =
    "SESSION ACTIVE\n" +
    data.session.user.email;
}

async function checkRole() {

  const { data, error } = await client.rpc('current_user_role');

  if (error) {
    document.getElementById("result").innerText =
      "ROLE ERROR:\n" + error.message;
    return;
  }

  document.getElementById("result").innerText =
    "ROLE FROM DB:\n" + data;
}

async function testUpdate() {

  const { data, error } = await client
    .from("invoices_px")
    .update({ invoice_number: "FAC-DEBUG" })
    .eq("id", "6aa54fb0-6dac-4d6c-8318-6feedbbb7140")
    .select();

  if (error) {
    document.getElementById("result").innerText =
      "BLOCKED:\n" + error.message;
    return;
  }

  document.getElementById("result").innerText =
    "UPDATE SUCCESS\nRows returned: " + data.length;
}

</script>

</body>
</html>
