<!DOCTYPE html>
<html>
<head>
  <title>SGI Debug</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<h2>Session Debug</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>

<br><br>
<button onclick="checkSession()">Check Session</button>
<button onclick="testUpdate()">Test Update</button>

<p id="result"></p>

<script>
  const SUPABASE_URL = "https://rnoprngmmqvrzfygyppg.supabase.co";
  const SUPABASE_KEY = "sb_publishable_zLWA_SDD0Y6Jt3ADtdmwZg_M95oKx8W";

  const { createClient } = supabase;
  const client = createClient(SUPABASE_URL, SUPABASE_KEY);

  async function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const { data, error } = await client.auth.signInWithPassword({
      email,
      password
    });

    if (error) {
      document.getElementById("result").innerText = error.message;
      return;
    }

    document.getElementById("result").innerText =
      "Logged in as: " + data.user.email + " | ID: " + data.user.id;
  }

  async function logout() {
    await client.auth.signOut();
    document.getElementById("result").innerText = "Logged out";
  }

  async function checkSession() {
    const { data } = await client.auth.getSession();

    if (!data.session) {
      document.getElementById("result").innerText = "NO ACTIVE SESSION";
      return;
    }

    document.getElementById("result").innerText =
      "SESSION ACTIVE | Email: " + data.session.user.email +
      " | ID: " + data.session.user.id;
  }

  async function testUpdate() {
    const { data: sessionData } = await client.auth.getSession();

    if (!sessionData.session) {
      document.getElementById("result").innerText = "NO SESSION - UPDATE SHOULD FAIL";
      return;
    }

    const { error } = await client
      .from("invoices_px")
      .update({ invoice_number: "FAC-DEBUG" })
      .eq("invoice_number", "FAC-TEST");

    if (error) {
      document.getElementById("result").innerText = "BLOCKED: " + error.message;
      return;
    }

    document.getElementById("result").innerText = "UPDATE SUCCESS";
  }
</script>

</body>
</html>
