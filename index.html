
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SGI - Sistema de Gestión de Importaciones</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{margin:0;font-family:Arial;background:#F5F6F8}
.layout{display:none;height:100vh}
.sidebar{width:260px;background:#1F2937;color:white;padding:20px}
.sidebar div{margin:10px 0;cursor:pointer}
.sidebar div:hover{color:#60A5FA}
.main{flex:1;display:flex;flex-direction:column}
.header{background:white;padding:15px;border-bottom:1px solid #e5e7eb}
.content{padding:20px;overflow:auto}
.card{background:white;padding:20px;border-radius:6px;margin-bottom:20px}
input,select,textarea{width:100%;padding:6px;margin-bottom:8px}
button{padding:6px 10px;background:#1D4ED8;color:white;border:none;border-radius:4px;margin-right:4px;cursor:pointer}
.delete{background:#DC2626}
.edit{background:#059669}
table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{padding:6px;border-bottom:1px solid #e5e7eb;text-align:left}
.total{background:#F3F4F6;font-weight:bold}
textarea{height:140px}
</style>
</head>

<body>

<div id="loginContainer">
<h2>SGI</h2>
<input id="email" placeholder="Correo">
<input id="password" type="password" placeholder="Contraseña">
<button onclick="login()">Ingresar</button>
<p id="loginMessage"></p>
</div>

<div class="layout" id="appLayout">

<div class="sidebar">
<h3>SGI</h3>
<div onclick="loadDashboard()">Dashboard</div>
<div onclick="loadSuppliers()">Proveedores</div>
<div onclick="loadContracts()">Contratos / PO</div>
<div onclick="loadFacturas()">Facturas PX</div>
<div onclick="loadSubpartidas()">Subpartidas ISD</div>
<div onclick="loadPayments()">Pagos ISD</div>
<div onclick="logout()">Cerrar sesión</div>
</div>

<div class="main">
<div class="header" id="userInfo"></div>
<div class="content" id="contentArea"></div>
</div>

</div>

<script>

const SUPABASE_URL="https://rnoprngmmqvrzfygyppg.supabase.co"
const SUPABASE_KEY="sb_publishable_zLWA_SDD0Y6Jt3ADtdmwZg_M95oKx8W"
const client=supabase.createClient(SUPABASE_URL,SUPABASE_KEY)

let currentInvoice=null
let page=0
const pageSize=50

function money(v){
return Number(v||0).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})
}

document.addEventListener("DOMContentLoaded",async()=>{
const {data}=await client.auth.getSession()
if(data.session){
loginContainer.style.display="none"
appLayout.style.display="flex"
userInfo.innerText=data.session.user.email
loadDashboard()
}
})

async function login(){
const {error}=await client.auth.signInWithPassword({
email:email.value,
password:password.value
})
if(error){loginMessage.innerText=error.message;return}
location.reload()
}

async function logout(){
await client.auth.signOut()
location.reload()
}

//////////////////// DASHBOARD

async function loadDashboard(){

const {data}=await client.rpc("is_period_open").catch(()=>({data:null}))

const {data:stats}=await client.from("subpartidas")
.select("porcentaje_isd")

let c0=0
let c25=0

stats.forEach(s=>{
if(Number(s.porcentaje_isd)==0)c0++
if(Number(s.porcentaje_isd)==2.5)c25++
})

contentArea.innerHTML=`

<div class="card">
<h3>Dashboard</h3>

<p>Subpartidas 0% ISD: <b>${c0}</b></p>
<p>Subpartidas 2.5% ISD: <b>${c25}</b></p>
<p>Total Subpartidas: <b>${stats.length}</b></p>

</div>

`

}

//////////////////// FACTURAS

async function loadFacturas(){

const {data}=await client
.from("invoices_px")
.select("id,invoice_number")

let rows=""

data.forEach(f=>{

rows+=`

<tr>
<td>${f.invoice_number}</td>
<td>
<button onclick="openFactura('${f.id}')">Abrir</button>
<button class="delete" onclick="deleteFactura('${f.id}')">Eliminar</button>
</td>
</tr>

`

})

contentArea.innerHTML=`

<div class="card">

<h3>Facturas PX</h3>

<input id="newInvoice" placeholder="Número factura">
<button onclick="createFactura()">Crear</button>

<table>
<tr>
<th>Factura</th>
<th></th>
</tr>
${rows}
</table>

</div>

`

}

async function createFactura(){

await client.from("invoices_px").insert({
invoice_number:newInvoice.value
})

loadFacturas()

}

async function deleteFactura(id){

await client.from("invoices_px").delete().eq("id",id)

loadFacturas()

}

//////////////////// FACTURA DETALLE

async function openFactura(id){

currentInvoice=id

const {data:factura}=await client
.from("invoices_px")
.select("*")
.eq("id",id)
.single()

const {data:items}=await client
.from("invoice_items")
.select("*,subpartidas(codigo_subpartida,porcentaje_isd)")
.eq("invoice_id",id)

let subtotal=0
let rows=""

items.forEach(i=>{

subtotal+=Number(i.valor_total)

let isdperc=i.subpartidas?i.subpartidas.porcentaje_isd:""
let sub=i.subpartidas?i.subpartidas.codigo_subpartida:""

rows+=`

<tr>

<td contenteditable="true" onblur="updateItem('${i.id}','descripcion',this.innerText)">${i.descripcion}</td>

<td contenteditable="true" onblur="updateItem('${i.id}','specification',this.innerText)">${i.specification||""}</td>

<td contenteditable="true" onblur="updateItem('${i.id}','unit',this.innerText)">${i.unit||""}</td>

<td contenteditable="true" onblur="updateItem('${i.id}','cantidad',this.innerText)">${i.cantidad}</td>

<td contenteditable="true" onblur="updateItem('${i.id}','precio_unitario',this.innerText)">${money(i.precio_unitario)}</td>

<td>${money(i.valor_total)}</td>

<td>${sub}</td>

<td>${isdperc}</td>

<td>${money(i.valor_total*(isdperc?isdperc/100:0))}</td>

<td>
<button class="delete" onclick="deleteItem('${i.id}')">Eliminar</button>
</td>

</tr>

`

})

let freight=Number(factura.freight||0)
let insurance=Number(factura.insurance||0)
let others=Number(factura.others||0)

let total=subtotal+freight+insurance+others

contentArea.innerHTML=`

<div class="card">

<h3>Factura ${factura.invoice_number}</h3>

<label>Freight</label>
<input id="f_freight" value="${freight}">

<label>Insurance</label>
<input id="f_insurance" value="${insurance}">

<label>Others</label>
<input id="f_others" value="${others}">

<button onclick="saveHeader()">Guardar cabecera</button>

<hr>

<h4>Pegar desde Excel</h4>

<textarea id="excel_data"></textarea>

<button onclick="importExcel()">Importar Excel</button>

<table>

<tr>
<th>Descripción</th>
<th>Spec</th>
<th>Unit</th>
<th>Cantidad</th>
<th>Precio</th>
<th>Total</th>
<th>Subpartida</th>
<th>ISD %</th>
<th>ISD</th>
<th></th>
</tr>

${rows}

<tr class="total">
<td colspan="5">Subtotal</td>
<td>${money(subtotal)}</td>
<td colspan="4"></td>
</tr>

<tr class="total">
<td colspan="5">Total factura</td>
<td>${money(total)}</td>
<td colspan="4"></td>
</tr>

</table>

<button onclick="loadFacturas()">Volver</button>

</div>

`

}

async function updateItem(id,field,value){

let v=value.replace(/,/g,"")

await client.from("invoice_items").update({
[field]:v
}).eq("id",id)

}

async function deleteItem(id){

await client.from("invoice_items").delete().eq("id",id)

openFactura(currentInvoice)

}

async function saveHeader(){

await client.from("invoices_px").update({
freight:f_freight.value,
insurance:f_insurance.value,
others:f_others.value
}).eq("id",currentInvoice)

openFactura(currentInvoice)

}

//////////////////// IMPORT EXCEL

async function importExcel(){

let text=excel_data.value.trim()

let lines=text.split("\n")

let rows=[]

for(const line of lines){

let cols=line.split("\t")

if(cols.length<6)continue

rows.push({

invoice_id:currentInvoice,
descripcion:cols[0],
specification:cols[1],
unit:cols[2],
cantidad:Number(cols[3].replace(/,/g,"")),
precio_unitario:Number(cols[4].replace(/,/g,"")),
valor_total:Number(cols[5].replace(/,/g,""))

})

}

if(rows.length==0){
alert("No se detectaron filas")
return
}

await client.from("invoice_items").insert(rows)

openFactura(currentInvoice)

}

//////////////////// SUBPARTIDAS

async function loadSubpartidas(){

let offset=page*pageSize

const {data}=await client
.from("subpartidas")
.select("*")
.range(offset,offset+pageSize-1)

let rows=""

data.forEach(s=>{

rows+=`

<tr>
<td>${s.codigo_subpartida}</td>
<td>${s.descripcion}</td>
<td>${s.porcentaje_isd}</td>
</tr>

`

})

contentArea.innerHTML=`

<div class="card">

<h3>Subpartidas ISD</h3>

<table>

<tr>
<th>Código</th>
<th>Descripción</th>
<th>% ISD</th>
</tr>

${rows}

</table>

<br>

<button onclick="prevPage()">Anterior</button>
<button onclick="nextPage()">Siguiente</button>

</div>

`

}

function nextPage(){
page++
loadSubpartidas()
}

function prevPage(){
if(page>0)page--
loadSubpartidas()
}

//////////////////// PLACEHOLDERS

function loadSuppliers(){
contentArea.innerHTML="<div class='card'>Módulo proveedores en construcción</div>"
}

function loadContracts(){
contentArea.innerHTML="<div class='card'>Módulo contratos en construcción</div>"
}

function loadPayments(){
contentArea.innerHTML="<div class='card'>Módulo pagos ISD en construcción</div>"
}

</script>

</body>
</html>
