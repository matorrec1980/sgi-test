
<!-- ===========================================================
SGI FACTURAS PX MODULE DOCUMENTATION

Purpose:
Register import invoices and items before ISD payment processing.

Accounting rule:
valor_total = dominant value
precio_unitario = valor_total / cantidad

ISD:
This module only displays the ISD percentage.
The real tax calculation will occur in the Payments module
after freight/insurance/others proration.

If subpartida exists → use database percentage
If subpartida missing → default 5%
If subpartida null → default 5%

Totals:
Subtotal items
+ Freight (if >0)
+ Insurance (if >0)
+ Others (if >0)
= TOTAL FACTURA

Excel structure:
Descripción
Especificación
Unidad
Cantidad
Precio Unitario
Valor Total
Subpartida

=========================================================== -->

<!-- ============================================================
SGI FACTURAS PX MODULE DOCUMENTATION
This block intentionally documents the business rules for future
maintenance and increases file size as requested.

Business Rules:
1. Facturas PX registers import invoices.
2. Items contain valor_total as dominant field.
3. precio_unitario = valor_total / cantidad.
4. ISD is NOT calculated here.
5. ISD will be calculated in Payment module using prorated charges.
6. Freight / Insurance / Others appear only when > 0.
7. Subpartida can be null and edited later.
8. Excel import supports bulk insertion of items.
9. Monetary fields must display thousand separators.
10. Totals = subtotal + freight + insurance + others.

This section ensures architectural knowledge stays with the code.
============================================================ -->

async function saveFacturaHeader(){

async function importExcel(){

let text=excel_data.value.trim()
let lines=text.split("\n")
let rows=[]

for(const line of lines){

let cols=line.split("\t")
if(cols.length<6)continue

rows.push({
invoice_id:currentInvoice,
descripcion:cols[0],
specification:cols[1],
unit:cols[2],
cantidad:Number(cols[3].replace(/,/g,"")),
precio_unitario:Number(cols[4].replace(/,/g,"")),
valor_total:Number(cols[5].replace(/,/g,"")),
codigo_subpartida:cols[6] ? cols[6].trim() : null
})

}

if(rows.length==0){alert("No se detectaron filas");return}

await client.from("invoice_items").insert(rows)
openFactura(currentInvoice)
}

async function loadSubpartidas(){

let offset=page*pageSize

const {data,count}=await client
.from("subpartidas")
.select("*",{count:"exact"})
.range(offset,offset+pageSize-1)

let totalPages=Math.ceil(count/pageSize)

let rows=""

data.forEach(s=>{
rows+=`<tr><td>${s.codigo_subpartida}</td><td>${s.descripcion}</td><td>${s.porcentaje_isd}</td></tr>`
})

contentArea.innerHTML=`
<div class="card">
<h3>Subpartidas ISD</h3>
<p>Página ${page+1} de ${totalPages}</p>
<table>
<tr><th>Código</th><th>Descripción</th><th>% ISD</th></tr>
${rows}
</table>
<br>
<button class="btn" onclick="prevPage()">Anterior</button>
<button class="btn" onclick="nextPage()">Siguiente</button>
</div>`
}

function nextPage(){page++;loadSubpartidas()}
function prevPage(){if(page>0)page--;loadSubpartidas()}

async function getISDPercent(code){
 if(!code || code.trim()=="") return 5;
 try{
   const {data}=await client
   .from("subpartidas")
   .select("porcentaje_isd")
   .eq("codigo_subpartida",code)
   .maybeSingle();
   if(!data) return 5;
   return Number(data.porcentaje_isd)||5;
 }catch(e){
   return 5;
 }
}

<script>

function round2(v){
 return Math.round((Number(v)+Number.EPSILON)*100)/100;
}

function money(v){
 return round2(v).toLocaleString("en-US",{
  minimumFractionDigits:2,
  maximumFractionDigits:2
 });
}

function calcISD(valor, porcentaje){
 let v=Number(valor)||0;
 let p=Number(porcentaje)||0;
 return round2(v*(p/100));
}

function calcUnitPrice(valor_total,cantidad){
 if(!cantidad || cantidad==0) return 0;
 return round2(valor_total/cantidad);
}

function calcFacturaTotal(subtotal,freight,insurance,others){
 return round2(
  Number(subtotal||0)
  + Number(freight||0)
  + Number(insurance||0)
  + Number(others||0)
 );
}
