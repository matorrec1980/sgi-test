<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>SGI RLS Security Test</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<h2>SGI RLS Security Test</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>
<button onclick="checkSession()">Check Session</button>
<button onclick="testUpdate()">Test Update</button>

<h3 id="result"></h3>

<script>

const SUPABASE_URL = "https://rnoprngmmqvrzfygyppg.supabase.co";
const SUPABASE_KEY = "sb_publishable_zLWA_SDD0Y6Jt3ADtdmwZg_M95oKx8W";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function login() {

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await client.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    document.getElementById("result").innerText =
      "LOGIN ERROR:\n" + error.message;
    return;
  }

  document.getElementById("result").innerText =
    "LOGIN SUCCESS\nUser ID: " + data.user.id;
}

async function logout() {

  await client.auth.signOut();
  document.getElementById("result").innerText =
    "Logged out.";
}

async function checkSession() {

  const { data } = await client.auth.getSession();

  if (!data.session) {
    document.getElementById("result").innerText =
      "NO SESSION";
    return;
  }

  const { data: roleData } = await client
    .rpc("current_user_role");

  document.getElementById("result").innerText =
    "SESSION ACTIVE\n" +
    "Email: " + data.session.user.email + "\n" +
    "User ID: " + data.session.user.id + "\n" +
    "ROLE FROM DB:\n" + roleData;
}

async function testUpdate() {

  const { data: sessionData } = await client.auth.getSession();

  if (!sessionData.session) {
    document.getElementById("result").innerText =
      "NO SESSION - UPDATE SHOULD FAIL";
    return;
  }

  const { data, error } = await client
    .from("liquidation_items")
    .update({ original_value: Math.floor(Math.random() * 10000) })
    .eq("id", "737bf92b-5e1b-4fac-8a96-eb2743317e36")
    .select();

  if (error) {
    document.getElementById("result").innerText =
      "BLOCKED BY RLS:\n" + error.message;
    return;
  }

  document.getElementById("result").innerText =
    "UPDATE SUCCESS\nRows returned: " + data.length;
}

</script>

</body>
</html>
