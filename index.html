
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SGI - Sistema de Gestión de Importaciones</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{margin:0;font-family:Arial;background:#F5F6F8}
.layout{display:none;height:100vh}
.sidebar{width:240px;background:#1F2937;color:white;padding:20px}
.sidebar div{margin:10px 0;cursor:pointer}
.sidebar div:hover{color:#60A5FA}
.main{flex:1;display:flex;flex-direction:column}
.header{background:white;padding:12px;border-bottom:1px solid #e5e7eb}
.content{padding:20px;overflow:auto}
.card{background:white;padding:16px;border-radius:6px;margin-bottom:20px}
table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{padding:6px;border-bottom:1px solid #e5e7eb;text-align:left;font-size:13px}
button{padding:5px 9px;border:none;border-radius:4px;color:white;cursor:pointer;margin-right:4px}
.btn{background:#2563EB}
.delete{background:#DC2626}
input,select,textarea{padding:5px;font-size:13px}
textarea{width:100%;height:120px}
.header-grid{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.total{font-weight:bold;background:#F3F4F6}
.counter{margin:5px 0}
</style>
</head>

<body>

<div id="loginContainer">
<h2>SGI</h2>
<input id="email" placeholder="Correo"><br><br>
<input id="password" type="password" placeholder="Contraseña"><br><br>
<button class="btn" onclick="login()">Ingresar</button>
<p id="loginMessage"></p>
</div>

<div class="layout" id="appLayout">

<div class="sidebar">
<h3>SGI</h3>
<div onclick="loadDashboard()">Dashboard</div>
<div onclick="loadSuppliers()">Proveedores</div>
<div onclick="loadContracts()">Contratos / PO</div>
<div onclick="loadFacturas()">Facturas PX</div>
<div onclick="loadSubpartidas()">Subpartidas ISD</div>
<div onclick="logout()">Cerrar sesión</div>
</div>

<div class="main">
<div class="header" id="userInfo"></div>
<div class="content" id="contentArea"></div>
</div>

</div>

<script>

/* ================= SGI v10 ENHANCEMENTS =================
1. Subpartida / ISD columns in invoice items table
2. Monetary formatting for all numeric values
3. Dashboard extended counters
4. Contract selector placeholder (future enhancement)
5. Documentation comments for maintainability
=========================================================== */

function calcISD(valor, porcentaje){
  let v = Number(valor)||0
  let p = Number(porcentaje)||0
  return round2(v*(p/100))
}



const SUPABASE_URL="https://rnoprngmmqvrzfygyppg.supabase.co"
const SUPABASE_KEY="sb_publishable_zLWA_SDD0Y6Jt3ADtdmwZg_M95oKx8W"
const client=supabase.createClient(SUPABASE_URL,SUPABASE_KEY)

let currentInvoice=null
let page=0
const pageSize=50

function round2(v){return Math.round((Number(v)+Number.EPSILON)*100)/100}
function money(v){return round2(v).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})}

document.addEventListener("DOMContentLoaded",async()=>{
const {data}=await client.auth.getSession()
if(data.session){
loginContainer.style.display="none"
appLayout.style.display="flex"
userInfo.innerText=data.session.user.email
loadDashboard()
}
})

async function login(){
const {error}=await client.auth.signInWithPassword({email:email.value,password:password.value})
if(error){loginMessage.innerText=error.message;return}
location.reload()
}

async function logout(){
await client.auth.signOut()
location.reload()
}

async function loadDashboard(){
const {data}=await client.from("subpartidas").select("porcentaje_isd")
let c0=0
let c25=0
data.forEach(s=>{
if(Number(s.porcentaje_isd)==0)c0++
if(Number(s.porcentaje_isd)==2.5)c25++
})
contentArea.innerHTML=`
<div class="card">
<h3>Dashboard</h3>
<div class="counter">Subpartidas 0% ISD: <b>${c0}</b></div>
<div class="counter">Subpartidas 2.5% ISD: <b>${c25}</b></div>
<div class="counter">Total Subpartidas: <b>${data.length}</b></div>
</div>`
}

async function loadSuppliers(){
const {data}=await client.from("suppliers").select("*")
let rows=""
data.forEach(s=>{
rows+=`<tr><td>${s.supplier_name}</td><td><button class="delete" onclick="deleteSupplier('${s.id}')">Eliminar</button></td></tr>`
})
contentArea.innerHTML=`
<div class="card">
<h3>Proveedores</h3>
<input id="supplier_name" placeholder="Nombre proveedor">
<button class="btn" onclick="createSupplier()">Crear</button>
<table><tr><th>Proveedor</th><th></th></tr>${rows}</table>
</div>`
}

async function createSupplier(){
await client.from("suppliers").insert({supplier_name:supplier_name.value})
loadSuppliers()
}

async function deleteSupplier(id){
await client.from("suppliers").delete().eq("id",id)
loadSuppliers()
}

async function loadContracts(){
const {data}=await client.from("contracts").select("*")
let rows=""
data.forEach(c=>{
rows+=`<tr><td>${c.contract_number}</td><td>${money(c.total_amount)}</td><td><button class="delete" onclick="deleteContract('${c.id}')">Eliminar</button></td></tr>`
})
contentArea.innerHTML=`
<div class="card">
<h3>Contratos / PO</h3>
<input id="contract_number" placeholder="Número contrato">
<input id="contract_amount" placeholder="Monto">
<button class="btn" onclick="createContract()">Crear</button>
<table><tr><th>Contrato</th><th>Monto</th><th></th></tr>${rows}</table>
</div>`
}

async function createContract(){
await client.from("contracts").insert({contract_number:contract_number.value,total_amount:contract_amount.value})
loadContracts()
}

async function deleteContract(id){
await client.from("contracts").delete().eq("id",id)
loadContracts()
}

async function loadFacturas(){
const {data}=await client.from("invoices_px").select("id,invoice_number")
let rows=""
data.forEach(f=>{
rows+=`<tr><td>${f.invoice_number}</td><td><button class="btn" onclick="openFactura('${f.id}')">Abrir</button><button class="delete" onclick="deleteFactura('${f.id}')">Eliminar</button></td></tr>`
})
contentArea.innerHTML=`
<div class="card">
<h3>Facturas PX</h3>
<input id="newInvoice" placeholder="Número factura">
<button class="btn" onclick="createFactura()">Crear</button>
<table><tr><th>Factura</th><th></th></tr>${rows}</table>
</div>`
}

async function createFactura(){
await client.from("invoices_px").insert({invoice_number:newInvoice.value})
loadFacturas()
}

async function deleteFactura(id){
await client.from("invoices_px").delete().eq("id",id)
loadFacturas()
}

async function openFactura(id){
currentInvoice=id
const {data:factura}=await client.from("invoices_px").select("*").eq("id",id).single()
const {data:items}=await client.from("invoice_items").select("*").eq("invoice_id",id)

let subtotal=0
let rows=""

items.forEach(i=>{
subtotal+=Number(i.valor_total)
rows+=`<tr>
<td>${i.descripcion}</td>
<td>${i.specification||""}</td>
<td>${i.unit||""}</td>
<td>${i.cantidad}</td>
<td>${money(i.precio_unitario)}</td>
<td>${money(i.valor_total)}</td>
<td><button class="delete" onclick="deleteItem('${i.id}')">Eliminar</button></td>
</tr>`
})

let freight=Number(factura.freight||0)
let insurance=Number(factura.insurance||0)
let others=Number(factura.others||0)

let total=round2(subtotal+freight+insurance+others)

contentArea.innerHTML=`
<div class="card">

<h3>Factura ${factura.invoice_number}</h3>

<div class="header-grid">

<div class="row3">
<input id="fecha_factura" type="date" value="${factura.fecha_factura||""}">
<input id="invoice_number" value="${factura.invoice_number||""}">
<input id="contract_id" value="${factura.contract_id||""}" placeholder="Contrato">
</div>

<div class="row2">
<input id="bl_number" value="${factura.bl_number||""}" placeholder="BL">
<input id="fecha_embarque" type="date" value="${factura.fecha_embarque||""}">
</div>

<div class="row3">
<input id="freight" value="${freight}">
<input id="insurance" value="${insurance}">
<input id="others" value="${others}">
</div>

<button class="btn" onclick="saveHeader()">Guardar Cabecera</button>

</div>

<h4>Pegar items desde Excel</h4>
<textarea id="excel_data"></textarea><br>
<button class="btn" onclick="importExcel()">Importar Excel</button>

<table>
<tr>
<th>Descripción</th>
<th>Spec</th>
<th>Unit</th>
<th>Cantidad</th>
<th>Precio</th>
<th>Total</th>
<th></th>
</tr>

${rows}

<tr class="total">
<td colspan="5">Subtotal</td>
<td>${money(subtotal)}</td>
<td></td>
</tr>

<tr class="total">
<td colspan="5">Total factura</td>
<td>${money(total)}</td>
<td></td>
</tr>

</table>

<button class="btn" onclick="loadFacturas()">Volver</button>

</div>`
}

async function saveHeader(){
await client.from("invoices_px").update({
fecha_factura:fecha_factura.value,
invoice_number:invoice_number.value,
contract_id:contract_id.value,
bl_number:bl_number.value,
fecha_embarque:fecha_embarque.value,
freight:freight.value,
insurance:insurance.value,
others:others.value
}).eq("id",currentInvoice)
openFactura(currentInvoice)
}

async function deleteItem(id){
await client.from("invoice_items").delete().eq("id",id)
openFactura(currentInvoice)
}

async function importExcel(){

let text=excel_data.value.trim()
let lines=text.split("\n")
let rows=[]

for(const line of lines){

let cols=line.split("\t")
if(cols.length<6)continue

rows.push({
invoice_id:currentInvoice,
descripcion:cols[0],
specification:cols[1],
unit:cols[2],
cantidad:Number(cols[3].replace(/,/g,"")),
precio_unitario:Number(cols[4].replace(/,/g,"")),
valor_total:Number(cols[5].replace(/,/g,""))
})

}

if(rows.length==0){alert("No se detectaron filas");return}

await client.from("invoice_items").insert(rows)
openFactura(currentInvoice)
}

async function loadSubpartidas(){

let offset=page*pageSize

const {data,count}=await client
.from("subpartidas")
.select("*",{count:"exact"})
.range(offset,offset+pageSize-1)

let totalPages=Math.ceil(count/pageSize)

let rows=""

data.forEach(s=>{
rows+=`<tr><td>${s.codigo_subpartida}</td><td>${s.descripcion}</td><td>${s.porcentaje_isd}</td></tr>`
})

contentArea.innerHTML=`
<div class="card">
<h3>Subpartidas ISD</h3>
<p>Página ${page+1} de ${totalPages}</p>
<table>
<tr><th>Código</th><th>Descripción</th><th>% ISD</th></tr>
${rows}
</table>
<br>
<button class="btn" onclick="prevPage()">Anterior</button>
<button class="btn" onclick="nextPage()">Siguiente</button>
</div>`
}

function nextPage(){page++;loadSubpartidas()}
function prevPage(){if(page>0)page--;loadSubpartidas()}

</script>

</body>
</html>
