<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SGI - Sistema de Gestión de Importaciones</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{margin:0;font-family:Arial;background:#F5F6F8}
.layout{display:none;height:100vh}
.sidebar{width:250px;background:#1F2937;color:white;padding:20px}
.sidebar div{margin:10px 0;cursor:pointer}
.sidebar div:hover{color:#60A5FA}
.main{flex:1;display:flex;flex-direction:column}
.header{background:white;padding:15px;border-bottom:1px solid #e5e7eb}
.content{padding:20px;overflow:auto}
.card{background:white;padding:20px;border-radius:6px;margin-bottom:20px}
input,select,textarea{width:100%;padding:6px;margin-bottom:8px}
button{padding:6px 10px;background:#1D4ED8;color:white;border:none;border-radius:4px;cursor:pointer}
button.delete{background:#DC2626}
table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{padding:6px;border-bottom:1px solid #e5e7eb;text-align:left}
textarea{height:160px}
</style>
</head>

<body>

<div id="loginContainer">
<h2>SGI</h2>
<input id="email" placeholder="Correo">
<input id="password" type="password" placeholder="Contraseña">
<button onclick="login()">Ingresar</button>
<p id="loginMessage" style="color:red"></p>
</div>

<div class="layout" id="appLayout">

<div class="sidebar">
<h3>SGI</h3>
<div onclick="loadDashboard()">Dashboard</div>
<div onclick="loadSuppliers()">Proveedores</div>
<div onclick="loadContratos()">Contrato / PO</div>
<div onclick="loadFacturas()">Facturas PX</div>
<div onclick="logout()">Cerrar sesión</div>
</div>

<div class="main">
<div class="header" id="userInfo"></div>
<div class="content" id="contentArea"></div>
</div>

</div>

<script>

const client = supabase.createClient(
"https://rnoprngmmqvrzfygyppg.supabase.co",
"sb_publishable_zLWA_SDD0Y6Jt3ADtdmwZg_M95oKx8W"
)

document.addEventListener("DOMContentLoaded", async ()=>{
const {data}=await client.auth.getSession()
if(data.session){
loginContainer.style.display="none"
appLayout.style.display="flex"
userInfo.innerText=data.session.user.email
loadDashboard()
}
})

async function login(){
const {error}=await client.auth.signInWithPassword({
email:email.value,
password:password.value
})
if(error){
loginMessage.innerText=error.message
return
}
location.reload()
}

async function logout(){
await client.auth.signOut()
location.reload()
}

function loadDashboard(){
contentArea.innerHTML='<div class="card"><h3>Dashboard</h3>Sistema SGI activo</div>'
}

async function loadSuppliers(){
const {data}=await client.from("suppliers").select("*")
let rows=""
data.forEach(s=>{
rows+=`<tr>
<td>${s.supplier_name}</td>
<td><button class="delete" onclick="deleteSupplier('${s.id}')">Eliminar</button></td>
</tr>`
})
contentArea.innerHTML=`
<div class="card">
<h3>Proveedores</h3>
<input id="supplier_name" placeholder="Proveedor">
<button onclick="createSupplier()">Crear</button>
<table>
<tr><th>Proveedor</th><th></th></tr>
${rows}
</table>
</div>`
}

async function createSupplier(){
await client.from("suppliers").insert({supplier_name:supplier_name.value})
loadSuppliers()
}

async function deleteSupplier(id){
await client.from("suppliers").delete().eq("id",id)
loadSuppliers()
}

async function loadContratos(){
const {data}=await client
.from("contracts")
.select("id,contract_number,total_amount,suppliers(supplier_name)")

let rows=""
data.forEach(c=>{
rows+=`<tr>
<td>${c.contract_number}</td>
<td>${c.suppliers?.supplier_name||"-"}</td>
<td>${c.total_amount||0}</td>
<td><button class="delete" onclick="deleteContrato('${c.id}')">Eliminar</button></td>
</tr>`
})

contentArea.innerHTML=`
<div class="card">
<h3>Contrato / PO</h3>
<input id="contract_number" placeholder="Número contrato">
<select id="supplier_select"></select>
<input id="contract_amount" type="number" placeholder="Monto">
<button onclick="createContrato()">Crear</button>
<table>
<tr>
<th>Número</th>
<th>Proveedor</th>
<th>Monto</th>
<th></th>
</tr>
${rows}
</table>
</div>`

loadSupplierSelect()
}

async function loadSupplierSelect(){
const {data}=await client.from("suppliers").select("*")
supplier_select.innerHTML="<option value=''>Sin proveedor</option>"
data.forEach(s=>{
supplier_select.innerHTML+=`<option value="${s.id}">${s.supplier_name}</option>`
})
}

async function createContrato(){
await client.from("contracts").insert({
contract_number:contract_number.value,
supplier_id:supplier_select.value||null,
total_amount:contract_amount.value||0
})
loadContratos()
}

async function deleteContrato(id){
await client.from("contracts").delete().eq("id",id)
loadContratos()
}

async function loadFacturas(){
const {data}=await client
.from("invoices_px")
.select("id,invoice_number,contracts(contract_number,suppliers(supplier_name))")

let rows=""
data.forEach(f=>{
rows+=`<tr>
<td>${f.invoice_number}</td>
<td>${f.contracts?.contract_number||"Sin contrato"}</td>
<td>${f.contracts?.suppliers?.supplier_name||"-"}</td>
<td>
<button onclick="openFactura('${f.id}')">Editar</button>
<button class="delete" onclick="deleteFactura('${f.id}')">Eliminar</button>
</td>
</tr>`
})

contentArea.innerHTML=`
<div class="card">
<h3>Facturas PX</h3>
<input id="invoice_number" placeholder="Número factura">
<button onclick="createFactura()">Crear</button>
<table>
<tr>
<th>Factura</th>
<th>Contrato</th>
<th>Proveedor</th>
<th></th>
</tr>
${rows}
</table>
</div>`
}

async function createFactura(){
await client.from("invoices_px").insert({
invoice_number:invoice_number.value
})
loadFacturas()
}

async function deleteFactura(id){
await client.from("invoices_px").delete().eq("id",id)
loadFacturas()
}

async function openFactura(id){

const {data:factura}=await client
.from("invoices_px")
.select("*")
.eq("id",id)
.single()

const {data:items}=await client
.from("invoice_items")
.select("*")
.eq("invoice_id",id)

let rows=""
let total=0

items.forEach(i=>{
total+=Number(i.valor_total)
rows+=`<tr>
<td>${i.descripcion}</td>
<td>${i.specification||""}</td>
<td>${i.unit||""}</td>
<td>${i.cantidad}</td>
<td>${i.valor_total}</td>
<td><button class="delete" onclick="deleteItem('${i.id}','${id}')">X</button></td>
</tr>`
})

contentArea.innerHTML=`
<div class="card">
<h3>Factura</h3>

<label>Número factura</label>
<input id="f_invoice" value="${factura.invoice_number||""}">

<button onclick="saveHeader('${id}')">Guardar</button>

<hr>

<h4>Pegar desde Excel</h4>
<textarea id="excel_data" placeholder="Pegue desde Excel"></textarea>

<button onclick="importExcel('${id}')">Importar</button>

<table>
<tr>
<th>Descripción</th>
<th>Especificación</th>
<th>Unidad</th>
<th>Cantidad</th>
<th>Total</th>
<th></th>
</tr>

${rows}

<tr>
<td colspan="4"><b>Total</b></td>
<td>${total}</td>
<td></td>
</tr>

</table>

<button onclick="loadFacturas()">Volver</button>

</div>`
}

async function saveHeader(id){
await client.from("invoices_px").update({
invoice_number:f_invoice.value
}).eq("id",id)
alert("Guardado")
}

async function importExcel(invoiceId){

let text = excel_data.value.trim()

if(!text){
alert("No hay datos pegados")
return
}

let lines = text.split("\n")

for(const line of lines){

if(!line.trim()) continue

let cols = line.split("\t")

if(cols.length < 6) continue

let descripcion = cols[0]
let specification = cols[1]
let unit = cols[2]
let cantidad = Number(cols[3])
let precio = Number(cols[4])
let total = Number(cols[5])
let codigo = cols[6] || null

let subpartida_id = null

if(codigo){
let {data} = await client
.from("subpartidas")
.select("id")
.eq("codigo_subpartida",codigo)
.limit(1)

if(data && data.length>0){
subpartida_id = data[0].id
}
}

await client.from("invoice_items").insert({
invoice_id:invoiceId,
subpartida_id:subpartida_id,
descripcion:descripcion,
specification:specification,
unit:unit,
cantidad:cantidad,
precio_unitario:precio,
valor_total:total
})

}

alert("Items importados")

openFactura(invoiceId)
}

async function deleteItem(id,invoiceId){
await client.from("invoice_items").delete().eq("id",id)
openFactura(invoiceId)
}

</script>

</body>
</html>
