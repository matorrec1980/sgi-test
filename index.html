
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SGI v10 - Sistema de Gestión de Importaciones</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{margin:0;font-family:Arial;background:#f4f6f9}
.sidebar{width:230px;background:#1f2937;color:white;height:100vh;padding:20px;position:fixed}
.sidebar div{margin:10px 0;cursor:pointer}
.sidebar div:hover{color:#60a5fa}
.main{margin-left:230px;padding:20px}
.card{background:white;padding:16px;border-radius:6px;margin-bottom:20px}
table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{border-bottom:1px solid #e5e7eb;padding:6px;font-size:13px;text-align:left}
button{padding:5px 10px;border:none;border-radius:4px;color:white;cursor:pointer}
.btn{background:#2563eb}
.delete{background:#dc2626}
.edit{background:#059669}
input,select,textarea{padding:6px;font-size:13px;width:100%}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:6px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px}
</style>
</head>

<body>

<div class="sidebar">
<h3>SGI</h3>
<div onclick="dashboard()">Dashboard</div>
<div onclick="proveedores()">Proveedores</div>
<div onclick="contratos()">Contratos / PO</div>
<div onclick="facturas()">Facturas PX</div>
<div onclick="subpartidas()">Subpartidas ISD</div>
</div>

<div class="main">
<div id="app"></div>
</div>

<script>

function money(v){
return Number(v).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})
}

function dashboard(){
app.innerHTML=`
<div class="card">
<h3>Dashboard</h3>
<p>Subpartidas 0% : --</p>
<p>Subpartidas 2.5% : --</p>
<p>Total subpartidas : --</p>
</div>`
}

function proveedores(){
app.innerHTML=`
<div class="card">
<h3>Proveedores</h3>

<input placeholder="Nombre proveedor">
<button class="btn">Crear proveedor</button>

<table>
<tr>
<th>Proveedor</th>
<th>Acciones</th>
</tr>

<tr>
<td>Proveedor Demo</td>
<td>
<button class="edit">Editar</button>
<button class="delete">Eliminar</button>
</td>
</tr>

</table>
</div>`
}

function contratos(){
app.innerHTML=`
<div class="card">
<h3>Contratos / PO</h3>

<div class="grid3">
<input placeholder="Número contrato">
<input placeholder="Proveedor">
<input placeholder="Monto contrato">
</div>

<button class="btn">Crear contrato</button>

<table>

<tr>
<th>Contrato</th>
<th>Proveedor</th>
<th>Monto</th>
<th>Acciones</th>
</tr>

<tr>
<td>CT-001</td>
<td>Proveedor Demo</td>
<td>${money(100000)}</td>
<td>
<button class="edit">Editar</button>
<button class="delete">Eliminar</button>
</td>
</tr>

</table>
</div>`
}

function facturas(){
app.innerHTML=`

<div class="card">

<h3>Factura PX</h3>

<div class="grid3">
<label>Fecha factura<input type="date"></label>
<label>N° factura<input></label>
<label>Contrato<select>
<option>Por asignar</option>
<option>CT-001</option>
<option>CT-002</option>
</select></label>
</div>

<div class="grid2">
<label>N° BL<input></label>
<label>Fecha BL<input type="date"></label>
</div>

<div class="grid3">
<label>Freight<input></label>
<label>Insurance<input></label>
<label>Others<input></label>
</div>

<button class="btn">Guardar cabecera</button>

<h4>Importar items desde Excel</h4>
<textarea placeholder="Pegar tabla de Excel aquí"></textarea>
<button class="btn">Importar Excel</button>

<table>

<tr>
<th>Descripción</th>
<th>Spec</th>
<th>Unit</th>
<th>Cantidad</th>
<th>Precio</th>
<th>Total</th>
<th>Subpartida</th>
<th>ISD %</th>
<th>ISD</th>
<th>Acciones</th>
</tr>

<tr>
<td>Producto demo</td>
<td>ZX118</td>
<td>PC</td>
<td>10</td>
<td>${money(50)}</td>
<td>${money(500)}</td>
<td>8474900000</td>
<td>2.5</td>
<td>${money(12.5)}</td>
<td>
<button class="edit">Editar</button>
<button class="delete">Eliminar</button>
</td>
</tr>

<tr>
<td colspan="5"><b>Subtotal</b></td>
<td>${money(500)}</td>
</tr>

<tr>
<td colspan="5"><b>Total factura</b></td>
<td>${money(550)}</td>
</tr>

</table>

</div>`
}

function subpartidas(){
app.innerHTML=`
<div class="card">
<h3>Subpartidas ISD</h3>

<p>Total subpartidas: --</p>
<p>Subpartidas 0%: --</p>
<p>Subpartidas 2.5%: --</p>

<table>

<tr>
<th>Subpartida</th>
<th>Descripción</th>
<th>ISD %</th>
</tr>

<tr>
<td>8474900000</td>
<td>Partes de maquinaria</td>
<td>2.5</td>
</tr>

</table>

</div>`
}

dashboard()

</script>

</body>
</html>
