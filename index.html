<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SGI</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{margin:0;font-family:Arial;background:#F5F6F8;}
.layout{display:none;height:100vh;}
.sidebar{width:260px;background:#1F2937;color:white;padding:20px;}
.sidebar h3{margin-top:0;}
.sidebar div{margin:10px 0;cursor:pointer;}
.sidebar div:hover{color:#60A5FA;}
.main{flex:1;display:flex;flex-direction:column;}
.header{background:white;padding:15px;border-bottom:1px solid #e5e7eb;}
.content{padding:20px;overflow:auto;}
.card{background:white;padding:20px;border-radius:6px;margin-bottom:20px;}
input,select{padding:6px;margin-bottom:8px;width:100%;}
button{padding:6px 10px;background:#1D4ED8;color:white;border:none;border-radius:4px;cursor:pointer;margin-top:6px;margin-right:4px;}
button.delete{background:#DC2626;}
table{width:100%;border-collapse:collapse;margin-top:10px;}
th,td{padding:6px;border-bottom:1px solid #e5e7eb;text-align:left;}
.total{font-weight:bold;}
hr{margin:15px 0;}
</style>
</head>

<body>

<div id="loginContainer">
<h2>SGI</h2>
<input type="email" id="email" placeholder="Correo">
<input type="password" id="password" placeholder="Contraseña">
<button onclick="login()">Ingresar</button>
<p id="loginMessage" style="color:red;"></p>
</div>

<div class="layout" id="appLayout">
<div class="sidebar">
<h3>SGI</h3>
<div onclick="loadDashboard()">Dashboard</div>
<div onclick="loadSuppliers()">Proveedores</div>
<div onclick="loadContratos()">Contrato / PO</div>
<div onclick="loadFacturas()">Facturas PX</div>
<div onclick="logout()">Cerrar Sesión</div>
</div>

<div class="main">
<div class="header" id="userInfo"></div>
<div class="content" id="contentArea"></div>
</div>
</div>

<script>

const client=supabase.createClient(
"https://rnoprngmmqvrzfygyppg.supabase.co",
"sb_publishable_zLWA_SDD0Y6Jt3ADtdmwZg_M95oKx8W"
);

async function login(){
const {error}=await client.auth.signInWithPassword({
email:email.value,
password:password.value
});
if(error){loginMessage.innerText=error.message;return;}
loadApp();
}

async function logout(){
await client.auth.signOut();
location.reload();
}

async function loadApp(){
const {data}=await client.auth.getSession();
if(!data.session)return;
loginContainer.style.display="none";
appLayout.style.display="flex";
userInfo.innerText=data.session.user.email;
loadDashboard();
}

function loadDashboard(){
contentArea.innerHTML=`<div class="card"><h3>Dashboard</h3></div>`;
}

//////////////////////////////////////////////////////////
// PROVEEDORES
//////////////////////////////////////////////////////////

async function loadSuppliers(){
const {data}=await client.from("suppliers").select("*");

let rows="";
data.forEach(s=>{
rows+=`
<tr>
<td>${s.supplier_name}</td>
<td><button class="delete" onclick="deleteSupplier('${s.id}')">Eliminar</button></td>
</tr>`;
});

contentArea.innerHTML=`
<div class="card">
<h3>Proveedores</h3>
<input id="new_supplier" placeholder="Nombre proveedor">
<button onclick="createSupplier()">Crear</button>
<table>
<tr><th>Proveedor</th><th></th></tr>
${rows}
</table>
</div>`;
}

async function createSupplier(){
await client.from("suppliers").insert({
supplier_name:new_supplier.value
});
loadSuppliers();
}

async function deleteSupplier(id){
await client.from("suppliers").delete().eq("id",id);
loadSuppliers();
}

//////////////////////////////////////////////////////////
// CONTRATOS
//////////////////////////////////////////////////////////

async function loadContratos(){

const {data}=await client
.from("contracts")
.select("id,contract_number,total_amount,supplier_id,suppliers(supplier_name)");

let rows="";
data.forEach(c=>{
rows+=`
<tr>
<td>${c.contract_number}</td>
<td>${c.suppliers?.supplier_name||"-"}</td>
<td>${c.total_amount||0}</td>
<td>
<button onclick="editarContrato('${c.id}')">Editar</button>
<button class="delete" onclick="eliminarContrato('${c.id}')">Eliminar</button>
</td>
</tr>`;
});

contentArea.innerHTML=`
<div class="card">
<h3>Contrato / PO</h3>

<input id="new_contract" placeholder="Número contrato">
<select id="supplier_select"></select>
<input id="new_amount" type="number" placeholder="Monto">
<button onclick="createContract()">Crear</button>

<table>
<tr>
<th>Número</th>
<th>Proveedor</th>
<th>Monto</th>
<th></th>
</tr>
${rows}
</table>
</div>`;

loadSupplierSelect("supplier_select");
}

async function loadSupplierSelect(selectId){
const {data}=await client.from("suppliers").select("id,supplier_name");
let select=document.getElementById(selectId);
select.innerHTML="<option value=''>Seleccionar proveedor</option>";
data.forEach(s=>{
select.innerHTML+=`<option value="${s.id}">${s.supplier_name}</option>`;
});
}

async function createContract(){
await client.from("contracts").insert({
contract_number:new_contract.value,
supplier_id:supplier_select.value||null,
total_amount:Number(new_amount.value||0)
});
loadContratos();
}

async function editarContrato(id){
const {data}=await client.from("contracts").select("*").eq("id",id).single();

contentArea.innerHTML=`
<div class="card">
<h3>Editar Contrato</h3>
<input id="edit_contract_number" value="${data.contract_number}">
<select id="edit_supplier"></select>
<input id="edit_amount" type="number" value="${data.total_amount||0}">
<button onclick="guardarContrato('${id}')">Guardar</button>
<button onclick="loadContratos()">Cancelar</button>
</div>`;

await loadSupplierSelect("edit_supplier");
document.getElementById("edit_supplier").value=data.supplier_id||"";
}

async function guardarContrato(id){
await client.from("contracts").update({
contract_number:edit_contract_number.value,
supplier_id:edit_supplier.value||null,
total_amount:Number(edit_amount.value||0)
}).eq("id",id);
loadContratos();
}

async function eliminarContrato(id){
if(!confirm("¿Seguro que desea eliminar este contrato?")) return;

const {error}=await client.from("contracts").delete().eq("id",id);

if(error){
alert("No se puede eliminar. Puede tener facturas asociadas.");
return;
}

loadContratos();
}

//////////////////////////////////////////////////////////
// FACTURAS (Cabecera + Ítems)
//////////////////////////////////////////////////////////

async function loadFacturas(){

const {data}=await client
.from("invoices_px")
.select("id,invoice_number,contracts(contract_number)");

let rows="";
data.forEach(f=>{
rows+=`
<tr>
<td>${f.invoice_number}</td>
<td>${f.contracts?.contract_number||"Sin contrato"}</td>
<td><button onclick="openFactura('${f.id}')">Abrir</button></td>
</tr>`;
});

contentArea.innerHTML=`
<div class="card">
<h3>Facturas PX</h3>
<input id="new_invoice" placeholder="Número factura">
<button onclick="createFactura()">Crear</button>

<table>
<tr><th>Número</th><th>Contrato</th><th></th></tr>
${rows}
</table>
</div>`;
}

async function createFactura(){
await client.from("invoices_px").insert({
invoice_number:new_invoice.value
});
loadFacturas();
}

async function openFactura(id){

const {data:factura}=await client
.from("invoices_px")
.select("*")
.eq("id",id)
.single();

const {data:items}=await client
.from("invoice_items")
.select("id,descripcion,cantidad,valor_total")
.eq("invoice_id",id);

let rows="";
let total=0;

items.forEach(i=>{
total+=Number(i.valor_total);
rows+=`
<tr>
<td>${i.descripcion}</td>
<td>${i.cantidad}</td>
<td>${i.valor_total}</td>
</tr>`;
});

contentArea.innerHTML=`
<div class="card">
<h3>Factura</h3>

<input id="f_invoice" value="${factura.invoice_number}">
<input type="number" id="f_freight" value="${factura.freight||0}" placeholder="Freight">
<input type="number" id="f_insurance" value="${factura.insurance||0}" placeholder="Insurance">
<input type="number" id="f_others" value="${factura.others||0}" placeholder="Others">

<hr>

<h4>Agregar Ítem</h4>
<select id="subpartida_select"></select>
<input id="item_desc" placeholder="Descripción">
<input type="number" id="item_qty" placeholder="Cantidad">
<input type="number" id="item_total" placeholder="Valor total">
<button onclick="addItem('${id}')">Agregar</button>

<table>
<tr><th>Descripción</th><th>Cantidad</th><th>Total</th></tr>
${rows}
<tr class="total"><td></td><td>Total</td><td>${total}</td></tr>
</table>

<button onclick="loadFacturas()">Volver</button>
</div>`;

loadSubpartidasSelect();
}

async function loadSubpartidasSelect(){
const {data}=await client
.from("subpartidas")
.select("id,codigo_subpartida")
.eq("estado","ACTIVA")
.limit(50);

let select=document.getElementById("subpartida_select");
select.innerHTML="";
data.forEach(s=>{
select.innerHTML+=`<option value="${s.id}">${s.codigo_subpartida}</option>`;
});
}

async function addItem(invoiceId){

let qty=Number(item_qty.value);
let total=Number(item_total.value);

await client.from("invoice_items").insert({
invoice_id:invoiceId,
subpartida_id:subpartida_select.value,
descripcion:item_desc.value,
cantidad:qty,
valor_total:total,
precio_unitario:total/qty
});

openFactura(invoiceId);
}

</script>
</body>
</html>
